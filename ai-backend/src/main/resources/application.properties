spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.api-key=api_key
spring.ai.openai.chat.options.model=gemini-2.5-flash

# --- DATABASE CONNECTION ---
spring.datasource.url=jdbc:mysql://localhost:3306/ai_backend_db
spring.datasource.username=root
# CHANGE THIS TO YOUR ACTUAL MYSQL PASSWORD:
spring.datasource.password=root

# --- HIBERNATE / JPA SETTINGS ---
# This magical line tells Spring: "If a table doesn't exist, create it automatically!"
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- AI EMBEDDING (RAG) ---
# Turn OFF the buggy Google embedding connection
spring.ai.openai.embedding.enabled=false

# Turn ON the Local On-Device AI Engine (ONNX)
spring.ai.embedding.transformer.enabled=true